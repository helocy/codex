version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: memory-postgres
    environment:
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory123
      POSTGRES_DB: memory_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI 后端
  backend:
    build: ./backend
    container_name: memory-backend
    ports:
      - "8001:8001"
    environment:
      POSTGRES_SERVER: postgres
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory123
      POSTGRES_DB: memory_db
      POSTGRES_PORT: 5432
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  # React 前端
  frontend:
    build: ./frontend
    container_name: memory-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  postgres_data:
  uploads_data:
